# ============================================================================
# Docker Compose for Easypanel Deployment
# 
# ℹ️ This configuration assumes PostgreSQL and Redis are provisioned externally
# via Easypanel (or another infrastructure) using the easypanel-provision.ts script.
#
# USAGE:
#   # Provision infrastructure in Easypanel (one-time setup)
#   EASYPANEL_URL=https://... EASYPANEL_TOKEN=... npm run provision:easypanel
#
#   # Deploy this compose file
#   docker-compose -f docker-compose.easypanel.yml up -d
#
# ============================================================================

version: "3.8"

services:
  hermes-admin:
    image: ghcr.io/m4rrec0s/oraculo/hermes-enterprise:latest
    environment:
      # --- Profile selection (entrypoint reads ENTERPRISE_PROFILE) ---
      ENTERPRISE_PROFILE: admin
      AGENT_NAME: Hermes
      # --- Admin model: NVIDIA Nemotron ---
      MODEL_PROVIDER: nvidia
      MODEL_NAME: nvidia/nemotron-3-super-120b-a12b
      MODEL_BASE_URL: https://integrate.api.nvidia.com/v1
      API_KEY_VAR: NVIDIA_API_KEY
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      # --- API server (HTTP, Bearer API_SERVER_KEY) ---
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: "8081"
      API_SERVER_KEY: ${ADMIN_API_KEY}
      API_SERVER_CORS_ORIGINS: "*"
      # --- Dashboard ---
      DASHBOARD_ENABLED: "true"
      DASHBOARD_PORT: "9119"
      DASHBOARD_HOST: 0.0.0.0
      # --- Database (external) ---
      HERMES_PG_HOST: ${HERMES_PG_HOST}
      HERMES_PG_PORT: ${HERMES_PG_PORT}
      HERMES_PG_DATABASE: ${HERMES_PG_DATABASE}
      HERMES_PG_USER: ${HERMES_PG_USER}
      HERMES_PG_PASSWORD: ${HERMES_PG_PASSWORD}
      HERMES_PG_SSL: ${HERMES_PG_SSL:-false}
      # --- Redis (external) ---
      HERMES_REDIS_HOST: ${HERMES_REDIS_HOST}
      HERMES_REDIS_PORT: ${HERMES_REDIS_PORT}
      HERMES_REDIS_PASSWORD: ${HERMES_REDIS_PASSWORD}
      # --- Misc ---
      HERMES_LOG_LEVEL: ${HERMES_LOG_LEVEL:-INFO}
      HERMES_TUI: ${HERMES_TUI:-false}
      HERMES_HEADLESS: ${HERMES_HEADLESS:-true}
      HOME: /home/hermes
    working_dir: /home/hermes
    volumes:
      - hermes-admin-data:/home/hermes/.hermes
    expose:
      - "8081"
      - "9119"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    networks:
      - hermes-enterprise-network

  hermes-atendimento:
    image: ghcr.io/m4rrec0s/oraculo/hermes-enterprise:latest
    environment:
      # --- Profile selection (entrypoint reads ENTERPRISE_PROFILE) ---
      ENTERPRISE_PROFILE: atendimento
      AGENT_NAME: Ana
      # --- Ana model: OpenAI gpt-5-nano ---
      MODEL_PROVIDER: openai
      MODEL_NAME: gpt-5-nano
      MODEL_BASE_URL: https://api.openai.com/v1
      API_KEY_VAR: OPENAI_API_KEY
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # --- API server (HTTP, Bearer API_SERVER_KEY) ---
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: "8082"
      API_SERVER_KEY: ${ANA_API_KEY}
      API_SERVER_CORS_ORIGINS: "*"
      # --- Database (external) ---
      HERMES_PG_HOST: ${HERMES_PG_HOST}
      HERMES_PG_PORT: ${HERMES_PG_PORT}
      HERMES_PG_DATABASE: ${HERMES_PG_DATABASE}
      HERMES_PG_USER: ${HERMES_PG_USER}
      HERMES_PG_PASSWORD: ${HERMES_PG_PASSWORD}
      HERMES_PG_SSL: ${HERMES_PG_SSL:-false}
      # --- Redis (external) ---
      HERMES_REDIS_HOST: ${HERMES_REDIS_HOST}
      HERMES_REDIS_PORT: ${HERMES_REDIS_PORT}
      HERMES_REDIS_PASSWORD: ${HERMES_REDIS_PASSWORD}
      # --- Misc ---
      HERMES_LOG_LEVEL: ${HERMES_LOG_LEVEL:-INFO}
      HERMES_TUI: ${HERMES_TUI:-false}
      HERMES_HEADLESS: ${HERMES_HEADLESS:-true}
      HOME: /home/hermes
    working_dir: /home/hermes
    volumes:
      - hermes-atendimento-data:/home/hermes/.hermes
    expose:
      - "8082"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    networks:
      - hermes-enterprise-network

volumes:
  hermes-admin-data:
  hermes-atendimento-data:

networks:
  hermes-enterprise-network:
    driver: bridge
