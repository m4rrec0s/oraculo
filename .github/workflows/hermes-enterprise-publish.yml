name: Build & Push hermes-enterprise (GHCR)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/hermes-enterprise

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with history + tags)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git
        run: |
          git config user.name "sync-bot"
          git config user.email "sync@cesto.local"
          git remote add upstream https://github.com/NousResearch/hermes-agent.git || true
          git fetch upstream --tags main

      - name: Scan upstream for collisions (blocks on protected files)
        run: bash scripts/sync_upstream.sh upstream main

  build:
    needs: sync-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build ui-tui
        run: cd ui-tui && npm install && npm run build

      - name: Build web dashboard
        run: cd web && npm install && npm run build

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.enterprise
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Trigger Easypanel autodeploy
        if: success()
        run: |
          echo "🚀 Triggering Easypanel autodeploy webhooks..."
          
          # Admin autodeploy
          echo "Deploying hermes-admin..."
          curl -X POST \
            -w "\nHTTP Status: %{http_code}\n" \
            "http://185.205.246.213:3000/api/deploy/3a4abf2c67756fd6712e642f95b43e3afaeb69447b1d73a2" || echo "⚠️ Admin webhook failed (non-fatal)"
          
          sleep 2
          
          # Atendimento autodeploy
          echo "Deploying hermes-atendimento..."
          curl -X POST \
            -w "\nHTTP Status: %{http_code}\n" \
            "http://185.205.246.213:3000/api/deploy/ce1d1e068927681fce50e871683c48aa77bc87a4d47312ee" || echo "⚠️ Atendimento webhook failed (non-fatal)"
          
          echo "✅ Autodeploy triggers sent"
