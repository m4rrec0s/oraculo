name: Build & Push hermes-enterprise (GHCR)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/hermes-enterprise

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python syntax check (compileall)
        run: python -m compileall -q hermes_cli enterprise scripts tools agents 2>&1 | head -40

      - name: Run test suite (hermetic)
        run: |
          if [ -x scripts/run_tests.sh ]; then
            bash scripts/run_tests.sh -q 2>&1 | tail -40 || echo "⚠ tests reported failures (non-fatal)"
          else
            echo "no run_tests.sh — skipping"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Web dashboard typecheck
        run: cd web && npm install && npm run typecheck

  build:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build ui-tui
        run: cd ui-tui && npm install && npm run build

      - name: Build web dashboard
        run: cd web && npm install && npm run build

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.enterprise
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Trigger Easypanel autodeploy
        if: success()
        run: |
          echo "🚀 Triggering Easypanel autodeploy webhooks..."
          
          # Admin autodeploy
          echo "Deploying hermes-admin..."
          curl -X POST \
            -w "\nHTTP Status: %{http_code}\n" \
            "http://185.205.246.213:3000/api/deploy/3a4abf2c67756fd6712e642f95b43e3afaeb69447b1d73a2" || echo "⚠️ Admin webhook failed (non-fatal)"
          
          sleep 2
          
          # Atendimento autodeploy
          echo "Deploying hermes-atendimento..."
          curl -X POST \
            -w "\nHTTP Status: %{http_code}\n" \
            "http://185.205.246.213:3000/api/deploy/ce1d1e068927681fce50e871683c48aa77bc87a4d47312ee" || echo "⚠️ Atendimento webhook failed (non-fatal)"
          
          sleep 2
          
          # Honda atendimento autodeploy
          echo "Deploying hermes-honda-atendimento..."
          curl -X POST \
            -w "\nHTTP Status: %{http_code}\n" \
            "http://185.205.246.213:3000/api/deploy/ea5536098f11b5dd758229a70564e3ae7435d8cbfe18a0fd" || echo "⚠️ Honda atendimento webhook failed (non-fatal)"
          
          echo "✅ Autodeploy triggers sent"
