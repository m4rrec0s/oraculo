version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${HERMES_PG_USER:-hermes}
      POSTGRES_PASSWORD: ${HERMES_PG_PASSWORD:-hermes}
      POSTGRES_DB: ${HERMES_PG_DATABASE:-hermes_enterprise}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HERMES_PG_USER:-hermes} -d ${HERMES_PG_DATABASE:-hermes_enterprise}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hermes-enterprise-network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - hermes-enterprise-network

  hermes-admin:
    image: ghcr.io/m4rrec0s/oraculo/hermes-enterprise:latest
    environment:
      # --- Admin (NVIDIA) ---
      ADMIN_API_SERVER_HOST: ${ADMIN_API_SERVER_HOST:-0.0.0.0}
      ADMIN_API_SERVER_PORT: ${ADMIN_API_SERVER_PORT:-8081}
      ADMIN_API_SERVER_ENABLED: ${ADMIN_API_SERVER_ENABLED:-true}
      ADMIN_API_SERVER_KEY: ${ADMIN_API_SERVER_KEY:-changeme-admin-key}
      ADMIN_DASHBOARD_PORT: ${ADMIN_DASHBOARD_PORT:-9119}
      ADMIN_DASHBOARD_AUTH_TOKEN: ${ADMIN_DASHBOARD_AUTH_TOKEN:-changeme-admin-key}
      ADMIN_MODEL: ${ADMIN_MODEL:-nvidia/nemotron-3-super-120b-a12b}
      ADMIN_LLM_BACKEND: ${ADMIN_LLM_BACKEND:-openai}
      ADMIN_OPENAI_API_KEY: ${ADMIN_OPENAI_API_KEY:-${NVIDIA_API_KEY:-}}
      ADMIN_OPENAI_BASE_URL: ${ADMIN_OPENAI_BASE_URL:-https://integrate.api.nvidia.com/v1}
      ADMIN_TEMPERATURE: ${ADMIN_TEMPERATURE:-0.7}
      ADMIN_MAX_TOKENS: ${ADMIN_MAX_TOKENS:-4096}
      ADMIN_SYSTEM_PROMPT: ${ADMIN_SYSTEM_PROMPT:-Você é o assistente de administração da loja Cesto.}
      # --- Database ---
      HERMES_PG_HOST: ${HERMES_PG_HOST:-postgres}
      HERMES_PG_PORT: ${HERMES_PG_PORT:-5432}
      HERMES_PG_DATABASE: ${HERMES_PG_DATABASE:-hermes_enterprise}
      HERMES_PG_USER: ${HERMES_PG_USER:-hermes}
      HERMES_PG_PASSWORD: ${HERMES_PG_PASSWORD:-hermes}
      HERMES_PG_SSL: ${HERMES_PG_SSL:-false}
      # --- Redis ---
      HERMES_REDIS_HOST: ${HERMES_REDIS_HOST:-redis}
      HERMES_REDIS_PORT: ${HERMES_REDIS_PORT:-6379}
      HERMES_REDIS_PASSWORD: ${HERMES_REDIS_PASSWORD:-}
      # --- Misc ---
      HERMES_LOG_LEVEL: ${HERMES_LOG_LEVEL:-INFO}
      HERMES_PROFILE_DIR: ${HERMES_PROFILE_DIR:-/home/hermes/.hermes}
      HERMES_TUI: ${HERMES_TUI:-false}
      HERMES_HEADLESS: ${HERMES_HEADLESS:-true}
    volumes:
      - hermes-admin-data:/home/hermes/.hermes
    expose:
      - "8081"
      - "9119"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hermes-enterprise-network

  hermes-atendimento:
    image: ghcr.io/m4rrec0s/oraculo/hermes-enterprise:latest
    environment:
      # --- Ana (OpenAI) ---
      ANA_API_SERVER_HOST: ${ANA_API_SERVER_HOST:-0.0.0.0}
      ANA_API_SERVER_PORT: ${ANA_API_SERVER_PORT:-8082}
      ANA_API_SERVER_ENABLED: ${ANA_API_SERVER_ENABLED:-true}
      ANA_API_SERVER_KEY: ${ANA_API_SERVER_KEY:-changeme-ana-key}
      ANA_MODEL: ${ANA_MODEL:-gpt-5-nano}
      ANA_LLM_BACKEND: ${ANA_LLM_BACKEND:-openai}
      ANA_OPENAI_API_KEY: ${ANA_OPENAI_API_KEY:-${OPENAI_API_KEY:-}}
      ANA_OPENAI_BASE_URL: ${ANA_OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANA_TEMPERATURE: ${ANA_TEMPERATURE:-0.7}
      ANA_MAX_TOKENS: ${ANA_MAX_TOKENS:-4096}
      ANA_SYSTEM_PROMPT: ${ANA_SYSTEM_PROMPT:-Você é a Ana, atendente virtual da loja Cesto.}
      # --- Database ---
      HERMES_PG_HOST: ${HERMES_PG_HOST:-postgres}
      HERMES_PG_PORT: ${HERMES_PG_PORT:-5432}
      HERMES_PG_DATABASE: ${HERMES_PG_DATABASE:-hermes_enterprise}
      HERMES_PG_USER: ${HERMES_PG_USER:-hermes}
      HERMES_PG_PASSWORD: ${HERMES_PG_PASSWORD:-hermes}
      HERMES_PG_SSL: ${HERMES_PG_SSL:-false}
      # --- Redis ---
      HERMES_REDIS_HOST: ${HERMES_REDIS_HOST:-redis}
      HERMES_REDIS_PORT: ${HERMES_REDIS_PORT:-6379}
      HERMES_REDIS_PASSWORD: ${HERMES_REDIS_PASSWORD:-}
      # --- Misc ---
      HERMES_LOG_LEVEL: ${HERMES_LOG_LEVEL:-INFO}
      HERMES_PROFILE_DIR: ${HERMES_PROFILE_DIR:-/home/hermes/.hermes}
      HERMES_TUI: ${HERMES_TUI:-false}
      HERMES_HEADLESS: ${HERMES_HEADLESS:-true}
    volumes:
      - hermes-atendimento-data:/home/hermes/.hermes
    expose:
      - "8082"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hermes-enterprise-network

volumes:
  postgres-data:
  hermes-admin-data:
  hermes-atendimento-data:

networks:
  hermes-enterprise-network:
    driver: bridge
